<div class="hero-section">
    <h1>Discover Your Next Treat</h1>
    <p>Hand-crafted cakes delivered to your doorstep.</p>
</div>

<form [formGroup]="searchProductForm" class="search-form" (submit)="onSubmit()">
    <mat-form-field appearance="outline" class="search-input">
        <mat-label>Enter keyword to search</mat-label>
        <input matInput formControlName="title">
        <button mat-button matSuffix color="primary" [disabled]="searchProductForm.invalid">
            <mat-icon>search</mat-icon>
        </button>
    </mat-form-field>
    <div class="refresh-button">
        <button mat-icon-button color="primary" (click)="refreshData()">
            <mat-icon>refresh</mat-icon>
        </button>
    </div>
</form>

<div class="product-list">
    <mat-card class="product-card" *ngFor="let product of products">

        <div class="product-image">
            <img [src]="product.processedImage" alt="product-image" [routerLink]="['/product', product.productId]">
        </div>

        <div class="product-details">
            <h2 class="product-name">{{product.productName}}</h2>
            <p class="product-description">{{product.description}}</p>

            <mat-divider></mat-divider>
            <div class="product-info">
                <div class="info-row">
                    <span class="info-label">Price:</span>
                    <span class="info-value">LKR {{product.price}}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Category:</span>
                    <span class="info-value">{{product.categoryName}}</span>
                </div>
            </div>

            <mat-divider></mat-divider>

            <div class="actions">
                <button mat-raised-button color="primary" class="cart-button" (click)="addToCart(product.productId)">
                    Add to Cart
                </button>
                <button mat-raised-button color="warn" class="view-button"
                    [routerLink]="['/product', product.productId]">
                    View Details
                </button>
            </div>
        </div>
    </mat-card>
</div>
