<nav class="navbar">
    <div class="logo-section">
        <img src="../../../assets/images/CakeLa_logo.jpg" alt="logo" class="logo">
        <a routerLink="/" class="brand-name">Cake_La</a>
    </div>

    <div class="nav-links" [class.active]="menuOpen">
        <a routerLink="/">Home</a>
        <!-- <a routerLink="/shop">Shop</a>
    <a routerLink="/customize">Customize Cake</a> -->
        <a routerLink="/orders">Orders</a>
        <a routerLink="/about">About</a>
    </div>

    <div class="nav-actions">
        <button mat-icon-button class="cart-btn" routerLink="/cart">
            <mat-icon>shopping_cart</mat-icon>
            <span class="cart-badge">{{cartCount}}</span>
        </button>

        <ng-container *ngIf="!isLoggedIn; else profileMenu">
            <button mat-raised-button color="primary" class="login-btn" (click)="goToLogin()">
                Login
            </button>
        </ng-container>

        <ng-template #profileMenu>
            <div class="profile-menu">

                <button mat-icon-button class="profile-btn" (click)="toggleProfileMenu()">
                    <mat-icon>account_circle</mat-icon>
                </button>

                <div class="dropdown" *ngIf="profileMenuOpen">
                    <div class="dropdown-header">
                        <mat-icon>person</mat-icon>
                        <span>My Account</span>
                    </div>

                    <a routerLink="/orders">
                        <mat-icon>receipt_long</mat-icon>
                        My Orders
                    </a>

                    <button (click)="openEditProfile()">
                        <mat-icon>edit</mat-icon>
                        Edit Profile
                    </button>

                    <button (click)="logout()">
                        <mat-icon>logout</mat-icon>
                        Logout
                    </button>

                </div>

            </div>
        </ng-template>
    </div>
</nav>
