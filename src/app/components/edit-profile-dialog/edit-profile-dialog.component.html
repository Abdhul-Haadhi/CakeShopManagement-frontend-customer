<div class="dialog-header">
    <h2 mat-dialog-title>
        <mat-icon>manage_accounts</mat-icon>
        Edit Profile
    </h2>
    <button mat-icon-button mat-dialog-close class="close-btn" aria-label="Close dialog">
        <mat-icon>close</mat-icon>
    </button>
</div>

<mat-dialog-content class="dialog-content">
    <p class="subtitle">Update your personal information below.</p>

    <form [formGroup]="profileForm">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <mat-icon matPrefix class="field-icon">person</mat-icon>
            <input matInput formControlName="customerName">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <mat-icon matPrefix class="field-icon">email</mat-icon>
            <input matInput formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Phone Number</mat-label>
            <mat-icon matPrefix class="field-icon">phone</mat-icon>
            <input matInput formControlName="phone">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address</mat-label>
            <mat-icon matPrefix class="field-icon">home</mat-icon>
            <input matInput formControlName="address">
        </mat-form-field>
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-footer">
    <button mat-button mat-dialog-close class="cancel-btn">Cancel</button>
    <button mat-raised-button class="save-btn" (click)="updateProfile()" [disabled]="profileForm.invalid">
        <mat-icon>save</mat-icon>
        Save Changes
    </button>
</mat-dialog-actions>
