<div class="card-payment-box" [formGroup]="paymentForm">
    <div class="box-header">
        <h3 class="box-title">Payment Details</h3>
        <div class="secure-badge">
            <mat-icon>lock</mat-icon> Secure
        </div>
    </div>

    <div class="form-row">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Card Number</mat-label>
            <mat-icon matPrefix>credit_card</mat-icon>
            <input matInput formControlName="cardNumber" maxlength="16" placeholder="0000 0000 0000 0000">
        </mat-form-field>
    </div>

    <div class="form-row">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Card Holder Name</mat-label>
            <mat-icon matPrefix>person_outline</mat-icon>
            <input matInput formControlName="cardHolderName" placeholder="Name exactly as it appears on card">
        </mat-form-field>
    </div>

    <div class="form-row multi-col">
        <mat-form-field appearance="outline">
            <mat-label>Month</mat-label>
            <mat-select formControlName="expiryMonth">
                <mat-option *ngFor="let month of months" [value]="month" [disabled]="isMonthDisabled(month)">
                    {{ month }}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Year</mat-label>
            <mat-select formControlName="expiryYear">
                <mat-option *ngFor="let year of years" [value]="year">
                    {{ year }}
                </mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>CVV</mat-label>
            <mat-icon matPrefix>security</mat-icon>
            <input matInput formControlName="cvv" maxlength="3" type="password" placeholder="***">
            <mat-icon matSuffix matTooltip="3 digits on the back of your card" class="info-icon">info_outline</mat-icon>
        </mat-form-field>
    </div>

    <div class="dialog-actions">
        <button mat-raised-button class="pay-btn" [disabled]="paymentForm.invalid" (click)="processPayment()">
            <mat-icon>lock</mat-icon> Pay LKR {{ data?.totalAmount || '0' }}
        </button>

        <button mat-button class="cancel-btn" (click)="closeDialog()">
            Cancel
        </button>
    </div>
</div>
